<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreeData - Collaborative Mind Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>[TreeData] Collaborative Idea Tree</h1>
        
        <div class="controls">
            <button onclick="fetchTree()">🔄 Refresh Tree</button>
            <button class="btn-secondary" onclick="toggleAll(true)">📂 Expand All</button>
            <button class="btn-secondary" onclick="toggleAll(false)">📁 Collapse All</button>
        </div>

        <div id="tree-container">
            <p>Loading tree...</p>
        </div>

        <hr>
            <div class="add-node-form">
                <h3>Add New Node to:</h3>
                
                <div id="hierarchy-path">Select a node from the tree above...</div>
            
                <div id="parent-tile" class="parent-tile">
                    <span id="parent-tile-text">No node selected</span>
                    <input type="hidden" id="parentId"> </div>
                
                <div class="input-group">
                    <input type="text" id="nodeContent" placeholder="Type your new sub-idea here..." required>
                    <button onclick="addNode()">Add to Tree</button>
                </div>
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
