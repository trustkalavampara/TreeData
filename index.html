<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>TreeData - Collaborative Mind Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>[TreeData] Collaborative Idea Tree</h1>
        
            <div class="global-controls">
                <button class="btn-secondary" onclick="fetchTree()">🔄 Refresh Tree</button>
                <button class="btn-secondary" onclick="toggleAll(true)">📂 Expand All</button>
                <button class="btn-secondary" onclick="toggleAll(false)">📁 Collapse All</button>
            </div>

        <div id="tree-container">
            <p>Loading tree...</p>
        </div>

        <hr>
            <div class="add-node-form">
                <h3>Add New Node to:</h3>
                <div id="hierarchy-path">Select a node...</div>
            
                <div id="parent-tile" class="parent-tile">
                    <span id="parent-tile-text">No node selected</span>
                    <input type="hidden" id="parentId">
                </div>
                
                <div class="input-group-vertical">
                    <input type="text" id="nodeContent" placeholder="Main Idea/Title" required>
                    <input type="tel" id="nodePhone" placeholder="Phone Number (Optional)">
                    <textarea id="nodeDescription" placeholder="Detailed Description..."></textarea>
                    <button onclick="addNode()">Add to Tree</button>
                </div>
            </div>
    </div>
    <div id="custom-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h2 style="color: #d9534f; font-size: 2.5rem;">Confirm New Entry?</h2>
            <div id="modal-path-preview" class="modal-path"></div>
            
            <div class="modal-details">
                <p id="modal-phone-preview"></p>
                <p id="modal-desc-preview"></p>
            </div>
    
            <div class="modal-actions">
                <button id="confirm-yes" class="btn-lg btn-confirm">YES, ADD IT</button>
                <button id="confirm-no" class="btn-lg btn-cancel">NO, GO BACK</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
