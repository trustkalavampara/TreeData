<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>TreeData - Collaborative Mind Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>[TreeData] Collaborative Idea Tree</h1>
        
            <div class="global-controls">
                <button class="btn-secondary" onclick="fetchTree()">🔄 Refresh Tree</button>
                <button class="btn-secondary" onclick="toggleAll(true)">📂 Expand All</button>
                <button class="btn-secondary" onclick="toggleAll(false)">📁 Collapse All</button>
                <label style="margin-left: 20px; font-size: 14px; cursor: pointer; user-select: none;">
                <input type="checkbox" id="imageToggle" checked onclick="updateImageVisibility()"> 
                    Show Images
                </label>
                
            </div>

        <div id="tree-container">
            <p>Loading tree...</p>
        </div>

        <hr>
            <div class="add-node-form">
                <h3>Add New Node to:</h3>
                <div id="hierarchy-path">Select a node...</div>
            
                    <div style="background: #fdfdfd; padding: 15px; border-radius: 8px; border: 1px dashed #007bff; margin-bottom: 20px;">
                        <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; align-items: flex-start;">
                            <p style="font-size: 0.8rem; color: #007bff; font-weight: bold; margin: 0; text-transform: uppercase;">
                                Preview
                            </p>
                            
                            <span id="parent-display" style="font-size: 0.75rem; background: #eef6ff; color: #0056b3; padding: 4px 10px; border-radius: 4px; border: 1px solid #d0e3ff; display: inline-flex; align-items: center; gap: 6px;">
                                <span id="parent-name-preview" style="font-weight: 600;">None Selected</span>
                                  <span style="font-size: 1rem; line-height: 1;">↳</span> 
                            </span>
                        </div>
                    
                        <input type="hidden" id="parentId">
                    
                        <div class="tree-row" id="preview-row" style="pointer-events: none;">
                            <div class="toggle-btn">+</div>
                            <div class="node-container" style="max-width: 400px; height: auto; min-width: 150px;">
                                <div class="node-placeholder" id="preview-image-box">?</div>
                                <img id="preview-image" class="node-image" src="" style="display:none;">
                                <div class="node-content" style="display: flex; flex-direction: column; white-space: normal; word-break: break-word;">
                                    <div style="font-size: 14px; font-weight: bold;" id="preview-name">New Node</div>
                                    <div style="font-size: 11px; color: #666;" id="preview-info">Info Preview</div>
                                    <div style="font-size: 11px; color: #007bff; margin-top: 4px; font-style: italic;" id="preview-description"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="input-group-vertical">
                        <label style="font-weight:bold; margin-top:10px;">Node Image (Optional)</label>
                        <input type="file" id="nodeImage" accept=".jpg, .jpeg, .png" style="padding:10px 0;" onchange="previewFile()">
                    </div>
                    
                    <div class="input-group-vertical">
                        <input type="text" id="nodeContent" placeholder="Name" oninput="updatePreview()" required>
                        <input type="tel" id="nodePhone" placeholder="Additional Info (Optional)" oninput="updatePreview()">
                        <textarea id="nodeDescription" placeholder="Extra Details... (Optional)" oninput="updatePreview()"></textarea>
                        <button onclick="addNode()">Add to Tree</button>
                    </div>
            </div>
    </div>
    <div id="custom-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h2 style="color: #007bff; font-size: 1.8rem; margin-top: 0;">Confirm Entry</h2>
            
            <div class="modal-body-scroll">
                <div id="modal-path-preview" class="modal-path"></div>
                
                <div class="modal-details" style="display:none;">
                    <p id="modal-phone-preview"></p>
                    <p id="modal-desc-preview"></p>
                </div>
            </div>
    
            <div class="modal-actions">
                <button id="confirm-yes" class="btn-lg btn-confirm">YES, SAVE</button>
                <button id="confirm-no" class="btn-lg btn-cancel">CANCEL</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
